<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
window.MathJax = {
  tex: { 
    inlineMath: [['$','$']], displayMath: [['$$','$$']], 
    processEscapes: true,
    processEnvironments: false,
    processRefs: false
  },
  options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] },
  startup: { typeset: false }
};
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── Dark theme (default) ── */
:root,[data-theme="dark"]{
  --bg:#0a0a0f;--surface:#111118;--border:#1e1e2e;
  --accent:#7c6af7;--accent2:#a78bfa;--text:#e2e0f0;
  --muted:#6b6880;--user-bg:#1a1528;--ai-bg:#111118;
  --glow:rgba(124,106,247,0.15);
  --pre-bg:#0d0d14;--pre-code:#abb2bf;
  --strong-color:#fff;--heading-color:#fff;
}

/* ── Light theme ── */
[data-theme="light"]{
  --bg:#f0f4ff;--surface:#ffffff;--border:#cdd6f0;
  --accent:#4361ee;--accent2:#3a56d4;--text:#1a1a2e;
  --muted:#5a6a9a;--user-bg:#dde6ff;--ai-bg:#ffffff;
  --glow:rgba(67,97,238,0.12);
  --pre-bg:#eef1f9;--pre-code:#383a42;
  --strong-color:#111;--heading-color:#111;
}
[data-theme="light"] body::before{opacity:0.1}
[data-theme="light"] body{background:var(--bg)}
[data-theme="light"] header{background:rgba(240,244,255,0.97)}
[data-theme="light"] #input-area{background:rgba(240,244,255,0.97)}
[data-theme="light"] #image-preview-strip{background:rgba(240,244,255,0.97)}
[data-theme="light"] select option{background:#eef1ff;color:var(--text)}
[data-theme="light"] .bubble pre{background:var(--pre-bg)}
[data-theme="light"] .bubble pre code{color:var(--pre-code)}
[data-theme="light"] .bubble :not(pre)>code{background:rgba(67,97,238,0.08);color:var(--accent2);border-color:rgba(67,97,238,0.2)}
[data-theme="light"] .bubble th{background:rgba(67,97,238,0.08);color:var(--accent2)}
[data-theme="light"] .bubble blockquote{border-left-color:var(--accent);color:var(--muted)}
[data-theme="light"] .bubble a{color:var(--accent2)}
[data-theme="light"] .bubble em{color:var(--accent)}
[data-theme="light"] .thinking-block{background:rgba(67,97,238,0.05);border-color:rgba(67,97,238,0.18)}
[data-theme="light"] .thinking-block:hover{background:rgba(67,97,238,0.09)}
[data-theme="light"] .thinking-label{color:var(--accent)}
[data-theme="light"] .thinking-label::after{background:rgba(67,97,238,0.25)}
[data-theme="light"] .answer-header{color:var(--accent2)}
[data-theme="light"] .answer-header::after{background:rgba(67,97,238,0.2)}
[data-theme="light"] .copy-btn{background:rgba(67,97,238,0.15);border-color:rgba(67,97,238,0.3);color:var(--accent2)}
[data-theme="light"] .copy-btn:hover{background:rgba(67,97,238,0.3)}
[data-theme="light"] .code-header{background:rgba(0,0,0,0.03)}
[data-theme="light"] .tps-badge{background:rgba(67,97,238,0.06);border-color:var(--border);color:var(--muted)}
[data-theme="light"] .copy-reply-btn,.action-btn-light{border-color:var(--border);color:var(--muted)}
[data-theme="light"] .action-btn{border-color:var(--border);color:var(--muted)}
[data-theme="light"] .copy-reply-btn:hover,[data-theme="light"] .action-btn:hover{border-color:var(--accent);color:var(--accent2)}
[data-theme="light"] .edit-msg-btn{color:var(--muted)}
[data-theme="light"] .edit-msg-btn:hover{color:var(--accent)}
[data-theme="light"] #send-btn{background:var(--accent)}
[data-theme="light"] #send-btn:active{background:var(--accent2)}
[data-theme="light"] .remove-img{background:#d0d8f0;border-color:var(--border);color:var(--text)}
[data-theme="light"] .message.user .bubble{border-color:rgba(67,97,238,0.3)}
[data-theme="light"] .input-wrapper{background:var(--surface);border-color:var(--border)}
[data-theme="light"] .input-wrapper:focus-within{border-color:rgba(67,97,238,0.5);box-shadow:0 0 0 3px var(--glow)}
[data-theme="light"] .hljs{background:var(--pre-bg) !important}

html{height:100%;height:-webkit-fill-available}
body{height:100vh;height:100dvh;background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;font-weight:300;overflow:hidden;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.4;pointer-events:none;z-index:0}
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100%;width:100%;max-width:860px;margin:0 auto}
header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;flex-wrap:wrap;background:rgba(10,10,15,0.95);backdrop-filter:blur(12px);flex-shrink:0}
.status-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 8px #4ade80;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
select,.hdr-btn{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--accent2);font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 8px;cursor:pointer;outline:none}
.hdr-btn{color:var(--muted);transition:all .15s}
.hdr-btn:hover{border-color:var(--accent);color:var(--accent2)}
select option{background:#1a1528;color:var(--text)}
.persona-wrap{display:flex;gap:4px}
.persona-btn{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 10px;cursor:pointer;transition:all .15s;white-space:nowrap}
.persona-btn.active{border-color:var(--accent);background:rgba(124,106,247,0.12);color:var(--accent2)}
[data-theme="light"] .persona-btn.active{border-color:var(--accent);background:rgba(67,97,238,0.1);color:var(--accent2)}
.header-title{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.1em;margin-left:auto}
#messages{flex:1;overflow-y:auto;padding:20px 16px 12px;display:flex;flex-direction:column;gap:18px;-webkit-overflow-scrolling:touch}
#messages::-webkit-scrollbar{width:3px}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.message{display:flex;gap:10px;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.message.user{flex-direction:row-reverse}
.avatar{width:28px;height:28px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;margin-top:2px}
.message.user .avatar{background:var(--user-bg);border:1px solid var(--accent);color:var(--accent2)}
.message.ai   .avatar{background:var(--surface);border:1px solid var(--border);color:var(--muted)}
.avatar.neko-avatar{font-size:18px}
.bubble{max-width:82%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.75;word-break:break-word;position:relative}
.message.user .bubble{background:var(--user-bg);border:1px solid rgba(124,106,247,.3);border-bottom-right-radius:3px}
.message.ai   .bubble{background:var(--ai-bg);border:1px solid var(--border);border-bottom-left-radius:3px}
.bubble img.upload-preview{max-width:100%;border-radius:8px;margin-bottom:6px;display:block}
.bubble p{margin-bottom:.65em}.bubble p:last-child{margin-bottom:0}
.bubble h1,.bubble h2,.bubble h3{margin:.8em 0 .4em;font-weight:500;color:var(--heading-color)}
.bubble h1{font-size:1.25em}.bubble h2{font-size:1.1em}.bubble h3{font-size:1em}
.bubble ul,.bubble ol{padding-left:1.5em;margin-bottom:.6em}
.bubble li{margin-bottom:.25em}
.bubble blockquote{border-left:3px solid var(--accent);padding-left:10px;color:var(--muted);margin:.6em 0;font-style:italic}
.bubble table{border-collapse:collapse;width:100%;margin:.6em 0;font-size:13px}
.bubble th,.bubble td{border:1px solid var(--border);padding:6px 10px;text-align:left}
.bubble th{background:rgba(124,106,247,.12);color:var(--accent2)}
.bubble a{color:var(--accent2);text-decoration:underline}
.bubble strong{color:var(--strong-color);font-weight:600}
.bubble em{color:#c4b5fd}
.bubble hr{border:none;border-top:1px solid var(--border);margin:.8em 0}
.bubble :not(pre)>code{font-family:'JetBrains Mono',monospace;font-size:12.5px;background:rgba(124,106,247,.12);color:var(--accent2);padding:1px 6px;border-radius:4px;border:1px solid rgba(124,106,247,.2)}
.bubble pre{background:var(--pre-bg);border:1px solid var(--border);border-radius:10px;margin:.65em 0;overflow-x:auto;position:relative}
.bubble pre code{background:transparent;padding:14px 16px;display:block;font-size:12.5px;line-height:1.65;font-family:'JetBrains Mono',monospace;color:var(--pre-code)}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.03)}
.code-lang{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.copy-btn{background:rgba(124,106,247,.2);border:1px solid rgba(124,106,247,.3);color:var(--accent2);border-radius:5px;font-size:10px;padding:2px 9px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s}
.copy-btn:hover{background:rgba(124,106,247,.4)}

/* ── Thinking block ── */
.thinking-block{background:rgba(124,106,247,.05);border:1px solid rgba(124,106,247,.18);border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;line-height:1.6;cursor:pointer;transition:background .15s}
.thinking-block:hover{background:rgba(124,106,247,.09)}
.thinking-label{font-size:9px;letter-spacing:0;color:var(--accent);text-transform:uppercase;margin-bottom:4px;opacity:.9;display:flex;align-items:center;gap:4px;user-select:none}
.thinking-label::after{content:'';flex:1;height:1px;background:rgba(124,106,247,0.3);margin-left:2px}
.toggle-icon{transition:transform .2s;flex-shrink:0}
.thinking-block.collapsed .thinking-content{display:none}
.thinking-block.collapsed .toggle-icon{transform:rotate(-90deg)}
.thinking-content{white-space:pre-wrap;margin-top:4px}

/* ── Answer section header ── */
.answer-header{font-size:9px;letter-spacing:0;color:var(--accent2);text-transform:uppercase;margin:4px 0 8px;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:5px;opacity:.8}
.answer-header::after{content:'';flex:1;height:1px;background:rgba(124,106,247,0.25)}

/* ── Reply bar ── */
.reply-bar{display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:nowrap;overflow-x:auto}
.reply-bar::-webkit-scrollbar{display:none}
.tps-badge{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:5px;padding:2px 8px;letter-spacing:.05em;white-space:nowrap;flex-shrink:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.copy-reply-btn,.action-btn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);background:transparent;border:1px solid var(--border);border-radius:5px;padding:2px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.copy-reply-btn:hover,.action-btn:hover{border-color:var(--accent);color:var(--accent2)}
.stop-btn{font-family:'JetBrains Mono',monospace;font-size:10px;color:#f87171;background:transparent;border:1px solid rgba(248,113,113,0.4);border-radius:5px;padding:2px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.stop-btn:hover{background:rgba(248,113,113,0.1);border-color:#f87171}

/* ── Edit button on user bubbles ── */
.edit-msg-btn{position:absolute;bottom:6px;right:6px;background:transparent;border:none;font-size:12px;cursor:pointer;color:var(--muted);opacity:0;transition:opacity .15s;line-height:1;padding:2px}
.bubble:hover .edit-msg-btn{opacity:0.65}
.edit-msg-btn:hover{opacity:1 !important}

.cursor{display:inline-block;width:2px;height:1em;background:var(--accent2);margin-left:2px;vertical-align:text-bottom;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;opacity:.4;padding:60px 20px;text-align:center;margin-top:12vh}
.welcome-icon{font-size:52px;margin-bottom:6px;line-height:1}
.welcome h2{font-size:16px;font-weight:400;font-family:'JetBrains Mono',monospace;letter-spacing:.05em}
.welcome p{font-size:12px;color:var(--muted);line-height:1.6}
#image-preview-strip{display:none;flex-wrap:wrap;gap:8px;padding:8px 16px 0;background:rgba(10,10,15,.95)}
#image-preview-strip.has-images{display:flex}
.preview-thumb{position:relative;width:56px;height:56px}
.preview-thumb img{width:56px;height:56px;object-fit:cover;border-radius:8px;border:1px solid var(--border)}
.remove-img{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#333;border:1px solid var(--border);color:var(--text);font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
#input-area{padding:10px 16px 16px;padding-bottom:max(16px,env(safe-area-inset-bottom));background:rgba(10,10,15,.95);backdrop-filter:blur(12px);border-top:1px solid var(--border);flex-shrink:0}
.input-wrapper{display:flex;gap:8px;align-items:flex-end;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:8px 10px;transition:border-color .2s}
.input-wrapper:focus-within{border-color:rgba(124,106,247,.5);box-shadow:0 0 0 3px var(--glow)}
#user-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:15px;font-weight:300;line-height:1.5;resize:vertical;max-height:400px;min-height:24px;overflow-y:auto}
#user-input::placeholder{color:var(--muted)}
.input-actions{display:flex;gap:6px;align-items:center}
#img-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;-webkit-tap-highlight-color:transparent}
#img-btn:hover{border-color:var(--accent);color:var(--accent2)}
#img-btn svg{width:15px;height:15px}
#img-file{display:none}
#send-btn{width:36px;height:36px;border-radius:9px;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;-webkit-tap-highlight-color:transparent}
#send-btn:active{transform:scale(.93);background:var(--accent2)}
#send-btn:disabled{opacity:.3;cursor:not-allowed}
#send-btn svg{width:15px;height:15px}
.hint{margin-top:6px;font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-align:center}

/* ── Mobile optimizations ── */
@media (max-width: 600px) {
  .message.ai .bubble{max-width:94%}
  .message.user .bubble{max-width:88%}
  #user-input{resize:none}
  .hint-desktop{display:none}
  .hint{font-size:9px}
  #messages{padding:14px 10px 8px;gap:14px}
  .bubble{padding:9px 12px;font-size:13.5px}
}

/* ── Share card modal ── */
.share-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;backdrop-filter:blur(6px)}
.share-card{width:320px;max-width:100%;border-radius:16px;overflow:hidden;background:#111118;border:1px solid #2a2a3e;box-shadow:0 16px 60px rgba(0,0,0,0.7)}
.share-card-header{padding:12px 16px 10px;border-bottom:1px solid #1e1e2e;display:flex;align-items:center;gap:8px}
.share-card-av{width:22px;height:22px;border-radius:6px;background:#1a1528;border:1px solid #7c6af7;display:flex;align-items:center;justify-content:center;font-size:8px;color:#a78bfa;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.share-card-model{font-family:'JetBrains Mono',monospace;font-size:10px;color:#6b6880;letter-spacing:.05em}
.share-card-body{padding:14px 16px;font-family:'Noto Sans SC',sans-serif;font-size:13px;line-height:1.75;color:#e2e0f0;max-height:280px;overflow:hidden;position:relative;white-space:pre-wrap;word-break:break-word}
.share-card-body::after{content:'';position:absolute;bottom:0;left:0;right:0;height:48px;background:linear-gradient(transparent,#111118)}
.share-card-footer{padding:9px 16px;border-top:1px solid #1e1e2e;display:flex;align-items:center;justify-content:space-between}
.share-card-logo{font-family:'JetBrains Mono',monospace;font-size:9px;color:#4a4860;letter-spacing:.12em}
.share-card-tps{font-family:'JetBrains Mono',monospace;font-size:9px;color:#4a4860}
.share-btn-row{display:flex;gap:10px}
.share-action-btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 18px;border-radius:8px;cursor:pointer;transition:all .15s;border:1px solid}
.share-dl-btn{background:#7c6af7;border-color:#7c6af7;color:#fff}
.share-dl-btn:hover{background:#9d8ef9;border-color:#9d8ef9}
.share-close-btn{background:transparent;border-color:#2a2a3e;color:#6b6880}
.share-close-btn:hover{border-color:#7c6af7;color:#a78bfa}
.math-display-wrap{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;max-width:100%;padding:4px 0}
/* ── Music ── */
.hdr-btn.music-on{border-color:var(--accent);color:var(--accent2)}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="status-dot"></div>
    <select id="model-select"><option value="qwen3.5:9b">qwen3.5:9b</option></select>
    <div class="persona-wrap">
      <button class="persona-btn active" data-persona="default">🤖 助手</button>
      <button class="persona-btn"        data-persona="neko">🐱 猫娘</button>
    </div>
    <button class="hdr-btn" id="clear-btn">清空</button>
    <button class="hdr-btn" id="theme-btn">☀ 浅色</button>
    <button class="hdr-btn" id="music-btn" title="背景音乐">🎵</button>
    <span class="header-title">// LOCAL AI //</span>
  </header>
  <audio id="bg-audio" loop></audio>
  <div id="image-preview-strip"></div>
  <div id="messages"></div>
  <div id="input-area">
    <div class="input-wrapper">
      <textarea id="user-input" placeholder="输入消息..." rows="1"></textarea>
      <div class="input-actions">
        <button id="img-btn" title="上传图片">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </button>
        <input type="file" id="img-file" accept="image/*" multiple>
        <button id="send-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="hint">Enter 发送 · Shift+Enter 换行<span class="hint-desktop"> · ↕ 可拖拽调整高度</span> · 📎 支持图片上传</div>
  </div>
</div>
<script>
// ── Marked + math protection ───────────────
const renderer = new marked.Renderer();
renderer.code = (code, lang) => {
  const hl = lang && hljs.getLanguage(lang) ? hljs.highlight(code,{language:lang}).value : hljs.highlightAuto(code).value;
  return `<pre><div class="code-header"><span class="code-lang">${lang||''}</span><button class="copy-btn" onclick="copyCode(this)">复制</button></div><code class="hljs">${hl}</code></pre>`;
};
function protectMath(src) {
  const map=[];
  // Display math $$...$$ → scrollable wrapper on mobile
  src=src.replace(/\$\$([\s\S]+?)\$\$/g,m=>{map.push({raw:m,display:true});return`@@M${map.length-1}@@`;});
  src=src.replace(/\$([^\s$][^$]*?[^\s$]|\S)\$/g,m=>{map.push({raw:m,display:false});return`@@M${map.length-1}@@`;});
  return{src,map};
}
function restoreMath(html,map){
  return html.replace(/@@M(\d+)@@/g,(_,i)=>{
    const{raw,display}=map[+i];
    if(display)return`<div class="math-display-wrap">${raw}</div>`;
    return raw;
  });
}
function mdToHtml(raw){
  const{src,map}=protectMath(raw);
  marked.setOptions({breaks:true,gfm:true});marked.use({renderer});
  return restoreMath(marked.parse(src),map);
}
function copyCode(btn){
  navigator.clipboard.writeText(btn.closest('pre').querySelector('code').innerText).then(()=>{
    btn.textContent='✓';setTimeout(()=>btn.textContent='复制',1500);
  });
}
function renderMath(el){if(window.MathJax)MathJax.typesetPromise([el]).catch(()=>{});}

// ── Theme toggle ───────────────────────────
const themeBtn = document.getElementById('theme-btn');
let isDark = localStorage.getItem('theme') === 'dark';
function applyTheme(){
  document.documentElement.dataset.theme = isDark ? 'dark' : 'light';
  themeBtn.textContent = isDark ? '☀ 浅色' : '🌙 深色';
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
}
themeBtn.addEventListener('click', () => { isDark = !isDark; applyTheme(); });
applyTheme();

// ── Personas ───────────────────────────────
const PERSONAS={
  default:'',
  neko:'你是一只傲娇的猫娘，说话时偶尔会加上"喵"，但嘴硬心软。无论用户说什么，你都会假装不在意，但实际上非常关心对方。不要打破这个人设。'
};
let currentPersona=localStorage.getItem('persona')||'default';

// ── Constants ──────────────────────────────
const API_HEADERS={'Content-Type':'application/json','ngrok-skip-browser-warning':'1'};
const STORAGE_KEY='ai_chat_v3';

// ── DOM refs ───────────────────────────────
const messagesEl=document.getElementById('messages');
const inputEl=document.getElementById('user-input');
const sendBtn=document.getElementById('send-btn');
const modelSelect=document.getElementById('model-select');
const imgBtn=document.getElementById('img-btn');
const imgFile=document.getElementById('img-file');
const previewStrip=document.getElementById('image-preview-strip');
const clearBtn=document.getElementById('clear-btn');

// ── Background music ───────────────────────
const musicBtn=document.getElementById('music-btn');
const bgAudio=document.getElementById('bg-audio');
bgAudio.src='music.mp3';
let musicOn=false;
musicBtn.addEventListener('click',()=>{
  musicOn=!musicOn;
  if(musicOn){bgAudio.play().catch(()=>{musicOn=false;});musicBtn.classList.add('music-on');}
  else{bgAudio.pause();musicBtn.classList.remove('music-on');}
});
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){bgAudio.pause();}
  else if(musicOn){bgAudio.play().catch(()=>{});}
});

// ── Smart scroll ───────────────────────────
function isNearBottom(){return messagesEl.scrollHeight-messagesEl.scrollTop-messagesEl.clientHeight<80;}
function scrollIfNeeded(){if(isNearBottom())messagesEl.scrollTop=messagesEl.scrollHeight;}
function scrollToBottom(){messagesEl.scrollTop=messagesEl.scrollHeight;}

// ── State ──────────────────────────────────
let history=[],displayLog=[],pendingImages=[];
let abortController=null;
function getSystemMsg(){const p=PERSONAS[currentPersona];return p?[{role:'system',content:p}]:[];}

// ── Storage — strip base64 images to avoid 5MB QuotaExceededError ──
function saveToStorage(){
  try{
    const safeHistory=history.map(msg=>{
      if(msg.images){const{images,...rest}=msg;return rest;}
      return msg;
    });
    localStorage.setItem(STORAGE_KEY,JSON.stringify({persona:currentPersona,log:displayLog,history:safeHistory}));
  }catch{
    // Fallback: save only displayLog + fresh system msg
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify({persona:currentPersona,log:displayLog,history:getSystemMsg()}));}catch{}
  }
}
function loadFromStorage(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return false;
    const data=JSON.parse(raw);
    currentPersona=data.persona||'default';
    displayLog=data.log||[];history=data.history||getSystemMsg();
    return displayLog.length>0;
  }catch{return false;}
}

// ── Load models ────────────────────────────
async function loadModels(){
  try{
    const res=await fetch('/api/tags',{headers:API_HEADERS});
    const data=await res.json();const models=data.models||[];if(!models.length)return;
    modelSelect.innerHTML='';
    models.forEach(m=>{const o=document.createElement('option');o.value=m.name;o.textContent=m.name;if(m.name.includes('qwen3.5'))o.selected=true;modelSelect.appendChild(o);});
  }catch{}
}
loadModels();

// ── Persona UI ─────────────────────────────
function applyPersonaUI(){document.querySelectorAll('.persona-btn').forEach(b=>b.classList.toggle('active',b.dataset.persona===currentPersona));}
document.querySelectorAll('.persona-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    if(btn.dataset.persona===currentPersona)return;
    currentPersona=btn.dataset.persona;localStorage.setItem('persona',currentPersona);
    applyPersonaUI();clearChat();
  });
});
applyPersonaUI();

// ── Welcome ────────────────────────────────
function showWelcome(){
  messagesEl.querySelectorAll('.welcome').forEach(w=>w.remove());
  const icon=currentPersona==='neko'?'🐱':'⬡';
  const sub=currentPersona==='neko'
    ?'喵~别以为我见到你会很高兴！<br>Running on RTX 4070 · 8K context'
    :'本地 AI 已就绪，开始对话吧<br>Running on RTX 4070 · 8K context';
  const w=document.createElement('div');w.className='welcome';
  w.innerHTML=`<div class="welcome-icon">${icon}</div><h2>NEURAL LINK ESTABLISHED</h2><p>${sub}</p>`;
  messagesEl.appendChild(w);
}

// ── Clear ──────────────────────────────────
function clearChat(){
  history=getSystemMsg();displayLog=[];pendingImages=[];
  previewStrip.innerHTML='';previewStrip.classList.remove('has-images');
  messagesEl.innerHTML='';showWelcome();saveToStorage();
}
clearBtn.addEventListener('click',clearChat);

// ── Restore session ────────────────────────
function restoreSession(){
  messagesEl.innerHTML='';
  if(!loadFromStorage()||!displayLog.length){showWelcome();return;}
  applyPersonaUI();
  displayLog.forEach((entry,idx)=>{
    if(entry.role==='user'){
      const b=addBubble('user');
      const d=document.createElement('div');d.textContent=entry.text;b.appendChild(d);
      addEditBtn(b,idx);
    }else{
      const b=addBubble('ai');
      if(entry.thinking){b.appendChild(buildThinkBlock(entry.thinking,true));b.appendChild(makeAnswerHeader());}
      const md=document.createElement('div');md.className='md-content';md.innerHTML=mdToHtml(entry.text);b.appendChild(md);
      appendReplyBar(b,entry.text,entry.tps||'',idx);
      renderMath(b);
    }
  });
  scrollToBottom();
}

// ── Image upload ───────────────────────────
imgBtn.addEventListener('click',()=>imgFile.click());
imgFile.addEventListener('change',async()=>{
  for(const file of imgFile.files){
    const dataUrl=await readAsDataUrl(file);
    pendingImages.push({base64:dataUrl.split(',')[1],mimeType:file.type,dataUrl});
    addThumb(dataUrl,pendingImages.length-1);
  }
  imgFile.value='';
});
function readAsDataUrl(f){return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(f);});}
function addThumb(dataUrl,idx){
  previewStrip.classList.add('has-images');
  const div=document.createElement('div');div.className='preview-thumb';div.dataset.idx=idx;
  div.innerHTML=`<img src="${dataUrl}"><div class="remove-img" onclick="removeThumb(this)">✕</div>`;
  previewStrip.appendChild(div);
}
function removeThumb(btn){
  const div=btn.parentElement;pendingImages.splice(parseInt(div.dataset.idx),1);div.remove();
  if(!previewStrip.children.length)previewStrip.classList.remove('has-images');
}

// ── Textarea auto-resize ───────────────────
const isMobile=()=>navigator.maxTouchPoints>0||window.innerWidth<600;
inputEl.addEventListener('input',()=>{inputEl.style.height='auto';inputEl.style.height=Math.min(inputEl.scrollHeight,400)+'px';});
inputEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey&&!isMobile()){e.preventDefault();sendMessage();}});
sendBtn.addEventListener('click',sendMessage);

// ── DOM helpers ────────────────────────────
function addBubble(role,images=[]){
  messagesEl.querySelectorAll('.welcome').forEach(w=>w.remove());
  const msg=document.createElement('div');msg.className=`message ${role}`;
  const av=document.createElement('div');av.className='avatar';
  av.textContent=role==='user'?'YOU':(currentPersona==='neko'?'🐱':'AI');
  if(role==='ai'&&currentPersona==='neko')av.classList.add('neko-avatar');
  const bubble=document.createElement('div');bubble.className='bubble';
  images.forEach(img=>{const im=document.createElement('img');im.className='upload-preview';im.src=img.dataUrl;bubble.appendChild(im);});
  msg.appendChild(av);msg.appendChild(bubble);messagesEl.appendChild(msg);
  scrollIfNeeded();
  return bubble;
}
function buildThinkBlock(text,collapsed=true){
  const el=document.createElement('div');el.className='thinking-block'+(collapsed?' collapsed':'');
  el.addEventListener('click',()=>el.classList.toggle('collapsed'));
  const label=document.createElement('div');label.className='thinking-label';
  label.innerHTML='<span class="toggle-icon">▾</span> 🧠 THINKING';
  const content=document.createElement('div');content.className='thinking-content';content.textContent=text;
  el.appendChild(label);el.appendChild(content);return el;
}
function makeAnswerHeader(){
  const h=document.createElement('div');h.className='answer-header';
  h.innerHTML='💬 回答';
  return h;
}
function addEditBtn(bubble,logIdx){
  const btn=document.createElement('button');btn.className='edit-msg-btn';
  btn.textContent='✏️';btn.title='编辑此消息';
  btn.addEventListener('click',()=>editMessage(logIdx));
  bubble.appendChild(btn);
}
function appendReplyBar(bubble,plainText,tpsText,logIdx){
  // Row 1: tps badge
  if(tpsText){
    const badgeRow=document.createElement('div');badgeRow.className='reply-bar';badgeRow.style.marginTop='7px';
    const badge=document.createElement('span');badge.className='tps-badge';badge.textContent=tpsText;
    badgeRow.appendChild(badge);bubble.appendChild(badgeRow);
  }
  // Row 2: action buttons
  const bar=document.createElement('div');bar.className='reply-bar';bar.style.marginTop='5px';

  const copyBtn=document.createElement('button');copyBtn.className='copy-reply-btn';copyBtn.textContent='复制';
  copyBtn.addEventListener('click',()=>{
    navigator.clipboard.writeText(plainText).then(()=>{copyBtn.textContent='✓';setTimeout(()=>copyBtn.textContent='复制',1500);});
  });
  bar.appendChild(copyBtn);

  const shareBtn=document.createElement('button');shareBtn.className='action-btn';shareBtn.textContent='📸';shareBtn.title='生成分享卡片';
  shareBtn.addEventListener('click',()=>showShareCard(plainText,tpsText,bubble));
  bar.appendChild(shareBtn);

  const regenBtn=document.createElement('button');regenBtn.className='action-btn';regenBtn.textContent='🔄';regenBtn.title='重新生成';
  regenBtn.addEventListener('click',()=>regenerate());
  bar.appendChild(regenBtn);

  bubble.appendChild(bar);
}

// ── Edit message ───────────────────────────
function editMessage(logIdx){
  const entry=displayLog[logIdx];
  if(!entry||entry.role!=='user')return;
  inputEl.value=entry.text==='[图片]'?'':entry.text;
  inputEl.style.height='auto';
  inputEl.style.height=Math.min(inputEl.scrollHeight,300)+'px';
  inputEl.focus();
  // Truncate from logIdx onward
  const sysOffset=(history[0]?.role==='system')?1:0;
  history.splice(logIdx+sysOffset);
  displayLog.splice(logIdx);
  // Remove DOM messages from logIdx onward
  const msgs=[...messagesEl.querySelectorAll('.message')];
  msgs.forEach((m,i)=>{if(i>=logIdx)m.remove();});
  if(!displayLog.length)showWelcome();
  saveToStorage();
}

// ── Regenerate last response ───────────────
async function regenerate(){
  if(sendBtn.disabled)return;
  if(!displayLog.length||displayLog[displayLog.length-1].role!=='assistant')return;
  displayLog.pop();
  history.pop();
  const aiMsgs=messagesEl.querySelectorAll('.message.ai');
  if(aiMsgs.length)aiMsgs[aiMsgs.length-1].remove();
  saveToStorage();
  sendBtn.disabled=true;
  try{
    await callAPI(modelSelect.value);
  }finally{
    sendBtn.disabled=false;if(!isMobile())inputEl.focus();
  }
}

// ── Share / Long screenshot ────────────────
function showShareCard(plainText,tpsText,bubble){
  const overlay=document.createElement('div');overlay.className='share-overlay';
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});

  // Preview card
  const card=document.createElement('div');card.className='share-card';
  const label=currentPersona==='neko'?'🐱':'AI';
  const preview=plainText.length>300?plainText.slice(0,300)+'…':plainText;
  card.innerHTML=`
    <div class="share-card-header">
      <div class="share-card-av">${label}</div>
      <span class="share-card-model">${modelSelect.value}</span>
    </div>
    <div class="share-card-body">${preview.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
    <div class="share-card-footer">
      <span class="share-card-logo">// LOCAL AI //</span>
      <span class="share-card-tps">${tpsText||''}</span>
    </div>`;

  const btnRow=document.createElement('div');btnRow.className='share-btn-row';

  // Long screenshot of full bubble
  const dlBtn=document.createElement('button');dlBtn.className='share-action-btn share-dl-btn';dlBtn.textContent='📥 长截图';
  dlBtn.addEventListener('click',async()=>{
    dlBtn.textContent='⏳ 渲染中...';dlBtn.disabled=true;
    try{
      // Clone bubble into off-screen wrapper for full render
      const wrap=document.createElement('div');
      // Use current theme colors
      const themeDark=document.documentElement.dataset.theme!=='light';
      const shotBg=themeDark?'#111118':'#ffffff';
      const shotText=themeDark?'#e2e0f0':'#1a1a2e';
      const shotMuted=themeDark?'#4a4860':'#5a6a9a';

      wrap.style.cssText=`position:fixed;left:-9999px;top:0;width:680px;background:${shotBg};padding:20px;border-radius:12px;font-family:'Noto Sans SC',sans-serif`;
      // Header strip
      const hdrStrip=document.createElement('div');
      hdrStrip.style.cssText=`font-family:'JetBrains Mono',monospace;font-size:10px;color:${shotMuted};margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid ${shotBorder};display:flex;justify-content:space-between`;
      hdrStrip.innerHTML=`<span>${label} · ${modelSelect.value}</span><span>// LOCAL AI //</span>`;
      wrap.appendChild(hdrStrip);
      const bubbleClone=bubble.cloneNode(true);
      // Remove action bars from clone
      bubbleClone.querySelectorAll('.reply-bar,.edit-msg-btn').forEach(el=>el.remove());
      bubbleClone.style.cssText=`max-width:100%;padding:0;background:transparent;border:none;color:${shotText};font-size:14px;line-height:1.75;word-break:break-word`;

      if(!themeDark){
        bubbleClone.querySelectorAll('pre').forEach(el=>el.style.background='#eef1f9');
        bubbleClone.querySelectorAll('code.hljs').forEach(el=>el.style.color='#383a42');
        bubbleClone.querySelectorAll(':not(pre)>code').forEach(el=>{el.style.background='rgba(67,97,238,0.08)';el.style.color='#3a56d4';});
      }
      wrap.appendChild(bubbleClone);
      // Footer
      const foot=document.createElement('div');
      foot.style.cssText=`font-family:'JetBrains Mono',monospace;font-size:9px;color:${shotMuted};margin-top:14px;padding-top:10px;border-top:1px solid ${shotBorder};text-align:right`;
      foot.textContent=tpsText||'';
      wrap.appendChild(foot);
      document.body.appendChild(wrap);
      const canvas=await html2canvas(wrap,{backgroundColor:shotBg,scale:2,useCORS:true,logging:false,
        windowWidth:720,scrollX:0,scrollY:0});
      document.body.removeChild(wrap);
      const a=document.createElement('a');
      a.download=`ai-shot-${Date.now()}.png`;a.href=canvas.toDataURL('image/png');a.click();
    }catch(err){console.error(err);alert('截图失败：'+err.message);}
    dlBtn.textContent='📥 长截图';dlBtn.disabled=false;

  const closeBtn=document.createElement('button');closeBtn.className='share-action-btn share-close-btn';closeBtn.textContent='✕ 关闭';
  closeBtn.addEventListener('click',()=>overlay.remove());

  btnRow.appendChild(dlBtn);btnRow.appendChild(closeBtn);
  overlay.appendChild(card);overlay.appendChild(btnRow);
  document.body.appendChild(overlay);
}

// ── Send message ───────────────────────────
async function sendMessage(){
  const text=inputEl.value.trim();
  if((!text&&!pendingImages.length)||sendBtn.disabled)return;
  const model=modelSelect.value,images=[...pendingImages];
  inputEl.value='';inputEl.style.height='auto';
  sendBtn.disabled=true;pendingImages=[];
  previewStrip.innerHTML='';previewStrip.classList.remove('has-images');

  const userBubble=addBubble('user',images);
  if(text){const d=document.createElement('div');d.textContent=text;userBubble.appendChild(d);}
  const userLogIdx=displayLog.length;
  addEditBtn(userBubble,userLogIdx);
  scrollToBottom();

  const userMsg={role:'user',content:text||''};
  if(images.length)userMsg.images=images.map(i=>i.base64);
  history.push(userMsg);
  displayLog.push({role:'user',text:text||'[图片]'});
  saveToStorage();

  try{
    await callAPI(model);
  }finally{
    sendBtn.disabled=false;
    if(!isMobile())inputEl.focus();
  }
}

// ── Core streaming API call ────────────────
async function callAPI(model){
  const aiBubble=addBubble('ai');
  const cursor=document.createElement('span');cursor.className='cursor';
  aiBubble.appendChild(cursor);

  // ── Live stop bar ──
  const liveBar=document.createElement('div');liveBar.className='reply-bar';
  const stopBtn=document.createElement('button');stopBtn.className='stop-btn';stopBtn.textContent='⏹ 停止';
  stopBtn.addEventListener('click',()=>{if(abortController)abortController.abort();});
  liveBar.appendChild(stopBtn);
  aiBubble.appendChild(liveBar);

  let thinkBuf='',mainBuf='';
  let thinkEl=null,thinkTextEl=null,answerHeaderEl=null;
  let rawBuf='',inThink=false,netBuf='';
  let contentTokenCount=0,thinkCharCount=0;
  const startTime=Date.now();
  let stopped=false;

  abortController=new AbortController();

  function createThinkBlockLive(){
    thinkEl=document.createElement('div');thinkEl.className='thinking-block';
    thinkEl.addEventListener('click',()=>thinkEl.classList.toggle('collapsed'));
    const label=document.createElement('div');label.className='thinking-label';
    label.innerHTML='<span class="toggle-icon">▾</span> 🧠 THINKING';
    thinkTextEl=document.createElement('div');thinkTextEl.className='thinking-content';
    thinkEl.appendChild(label);thinkEl.appendChild(thinkTextEl);
    aiBubble.insertBefore(thinkEl,liveBar);
  }
  function finishThink(){
    if(thinkEl&&!answerHeaderEl){
      thinkEl.querySelector('.thinking-label').innerHTML='<span class="toggle-icon">▾</span> 🧠 THINKING';
      thinkEl.classList.add('collapsed');
      answerHeaderEl=makeAnswerHeader();
      aiBubble.insertBefore(answerHeaderEl,liveBar);
    }
  }
  function renderMain(){
    for(const n of[...aiBubble.childNodes]){if(n.classList?.contains('md-content'))n.remove();}
    if(!mainBuf)return;
    const d=document.createElement('div');d.className='md-content';d.innerHTML=mdToHtml(mainBuf);
    aiBubble.insertBefore(d,liveBar);
  }
  function processRaw(){
    while(true){
      if(!inThink){
        const si=rawBuf.indexOf('<think>');
        if(si===-1){const safe=rawBuf.length>7?rawBuf.slice(0,rawBuf.length-7):'';mainBuf+=safe;rawBuf=rawBuf.slice(safe.length);break;}
        mainBuf+=rawBuf.slice(0,si);rawBuf=rawBuf.slice(si+7);inThink=true;if(!thinkEl)createThinkBlockLive();
      }else{
        const ei=rawBuf.indexOf('</think>');
        if(ei===-1){const safe=rawBuf.length>8?rawBuf.slice(0,rawBuf.length-8):'';thinkBuf+=safe;rawBuf=rawBuf.slice(safe.length);if(thinkTextEl)thinkTextEl.textContent=thinkBuf;break;}
        thinkBuf+=rawBuf.slice(0,ei);rawBuf=rawBuf.slice(ei+8);inThink=false;finishThink();if(thinkTextEl)thinkTextEl.textContent=thinkBuf;
      }
    }
    renderMain();scrollIfNeeded();
  }

  function finalize(evalCount,evalDuration){
    if(rawBuf){if(inThink){thinkBuf+=rawBuf;if(thinkTextEl)thinkTextEl.textContent=thinkBuf;}else{mainBuf+=rawBuf;}rawBuf='';}
    renderMain();finishThink();cursor.remove();liveBar.remove();
    const elapsed=evalDuration>0?(evalDuration/1e9).toFixed(1):((Date.now()-startTime)/1000).toFixed(1);
    const tps=evalDuration>0?(evalCount/(evalDuration/1e9)).toFixed(1):'?';
    const thinkTokenEst=Math.round(thinkCharCount/3.5);
    const totalTokens=evalCount+thinkTokenEst;
    let tpsText=stopped
      ?(thinkTokenEst>0?`~${totalTokens} tokens · ${tps} t/s · ${elapsed}s ⏹`:`${evalCount||contentTokenCount} tokens · ${tps} t/s · ${elapsed}s ⏹`)
      :(thinkTokenEst>0?`~${totalTokens} tokens (含思考) · ${tps} t/s · ${elapsed}s`:`${evalCount} tokens · ${tps} t/s · ${elapsed}s`);
    const aiLogIdx=displayLog.length;
    appendReplyBar(aiBubble,mainBuf,tpsText,aiLogIdx);
    history.push({role:'assistant',content:mainBuf});
    displayLog.push({role:'assistant',text:mainBuf,thinking:thinkBuf||null,tps:tpsText});
    saveToStorage();renderMath(aiBubble);scrollIfNeeded();
  }

  try{
    const res=await fetch('/api/chat',{method:'POST',headers:API_HEADERS,
      body:JSON.stringify({model,messages:history,stream:true}),
      signal:abortController.signal});
    const reader=res.body.getReader();const decoder=new TextDecoder();
    let lastEvalCount=0,lastEvalDuration=0;
    outer:while(true){
      const{done,value}=await reader.read();if(done)break;
      const lines=(netBuf+decoder.decode(value,{stream:true})).split('\n');netBuf=lines.pop();
      for(const line of lines){
        if(!line.trim())continue;
        try{
          const data=JSON.parse(line);
          const thinkToken=data?.message?.thinking||'';
          if(thinkToken){
            if(!thinkEl)createThinkBlockLive();
            thinkBuf+=thinkToken;thinkCharCount+=thinkToken.length;
            if(thinkTextEl)thinkTextEl.textContent=thinkBuf;
            scrollIfNeeded();
          }
          const token=data?.message?.content||'';
          if(token){
            contentTokenCount++;
            if(thinkBuf&&!inThink){
              if(!answerHeaderEl)finishThink();
              mainBuf+=token;renderMain();
            }else{rawBuf+=token;processRaw();}
            scrollIfNeeded();
          }
          if(data.eval_count)lastEvalCount=data.eval_count;
          if(data.eval_duration)lastEvalDuration=data.eval_duration;
          if(data.done){finalize(lastEvalCount,lastEvalDuration);break outer;}
        }catch{}
      }
    }
  }catch(e){
    cursor.remove();liveBar.remove();
    if(e.name==='AbortError'){
      stopped=true;
      finalize(contentTokenCount,0);
    }else{
      aiBubble.textContent='⚠ 连接失败，请检查 Ollama 是否在运行';
    }
  }
  abortController=null;
  cursor.remove();
}

// ── Init ───────────────────────────────────
restoreSession();
</script>
