<!doctype html>
<html lang="zh-CN" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <title>AI Chat</title>
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"
        />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        <script>
            window.MathJax = {
                tex: {
                    inlineMath: [["$", "$"]],
                    displayMath: [["$$", "$$"]],
                    processEscapes: true,
                    processEnvironments: false,
                    processRefs: false,
                },
                options: {
                    skipHtmlTags: [
                        "script",
                        "noscript",
                        "style",
                        "textarea",
                        "pre",
                        "code",
                    ],
                },
                startup: { typeset: false },
            };
        </script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js"></script>
        <link rel="stylesheet" href="style.css" />
        <script src="chat.js" defer></script>
    </head>
    <body>
        <div id="app">
            <header>
                <div class="status-dot"></div>
                <select id="model-select">
                    <option value="qwen3.5:9b">qwen3.5:9b</option>
                </select>
                <div class="persona-wrap">
                    <button class="persona-btn active" data-persona="default">
                        🤖 助手
                    </button>
                    <button class="persona-btn" data-persona="neko">
                        🐱 猫娘
                    </button>
                </div>
                <button class="hdr-btn" id="clear-btn">清空</button>
                <button class="hdr-btn" id="theme-btn">☀ 浅色</button>
                <button class="hdr-btn" id="music-btn" title="背景音乐">
                    🎵
                </button>
                <span class="header-title">// LOCAL AI //</span>
            </header>
            <audio id="bg-audio" loop></audio>
            <div id="image-preview-strip"></div>
            <div id="messages"></div>
            <div id="input-area">
                <div class="input-wrapper" id="input-wrapper">
                    <textarea
                        id="user-input"
                        placeholder="输入消息… 可粘贴/拖拽图片"
                        rows="1"
                    ></textarea>
                    <div class="input-actions">
                        <button id="img-btn" title="上传图片">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <rect
                                    x="3"
                                    y="3"
                                    width="18"
                                    height="18"
                                    rx="2"
                                />
                                <circle cx="8.5" cy="8.5" r="1.5" />
                                <polyline points="21 15 16 10 5 21" />
                            </svg>
                        </button>
                        <input
                            type="file"
                            id="img-file"
                            accept="image/*"
                            multiple
                        />
                        <button id="send-btn">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2.5"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <line x1="22" y1="2" x2="11" y2="13" />
                                <polygon points="22 2 15 22 11 13 2 9 22 2" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="hint">
                    Enter 发送 · Shift+Enter 换行<span class="hint-desktop">
                        · ↕ 可拖拽调整高度</span
                    >
                    · 📎 支持图片上传/粘贴/拖拽
                </div>
            </div>
        </div>
    </body>
</html>
